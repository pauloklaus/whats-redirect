<!doctype html>

    <meta
      name="viewport"

    />
    <meta name="theme-color" content="#25D366" />
    <meta

    <meta property="og:type" content="website" />

    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:description"
      content="Start WhatsApp chats without saving contacts. Enter a phone number and open the conversation instantly."

    <meta
      name="twitter:image"

      rel="icon"
      type="image/png"

    <link
      rel="icon"
      type="image/png"

    />

      rel="icon"
      type="image/png"
